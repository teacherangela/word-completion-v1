<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Teacher Angela's Word Completion!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #e3f2fd; /* Lightest Pastel Blue */
            --p1-color: #42a5f5; /* Sky Blue */
            --p2-color: #90caf9; /* Soft Blue */
            --p3-color: #bbdefb; /* Very Light Blue */
            --accent: #1e88e5;   /* Stronger Pastel Blue */
            --text-dark: #2c3e50; 
            --text-light: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; 
            background: var(--bg-main); color: var(--text-dark); 
            overflow: hidden; touch-action: none; 
            -webkit-user-select: none; user-select: none;
            width: 100vw; height: 100vh;
        }

        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: background 0.5s ease; }
        
        .main-title {
            font-size: 85px; text-align: center; margin-bottom: 30px; color: var(--accent);
            text-shadow: 2px 2px 0px white, 4px 4px 15px rgba(30,136,229,0.2);
            line-height: 0.9; font-weight: 700;
        }

        #intro-screen { 
            display: flex; 
            background: linear-gradient(rgba(227, 242, 253, 0.7), rgba(227, 242, 253, 0.7)), url('background.gif') center/cover; 
        }
        
        #game-boundary { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 5; touch-action: none; }
        
        .player-lane { 
            position: relative; height: 100%; flex: 1; 
            border-right: 2px dashed rgba(30,136,229,0.1); 
            display: flex; flex-direction: column; overflow: hidden;
            background-size: cover; background-position: center;
            transition: opacity 0.3s, filter 0.3s, background-image 0.5s ease;
            touch-action: none;
        }
        .player-lane.frozen { opacity: 0.5; filter: grayscale(0.8); pointer-events: none !important; }

        .lane-header {
            background: rgba(255, 255, 255, 0.85); padding: 10px; padding-top: 80px; 
            text-align: center; z-index: 30; pointer-events: none; border-bottom: 1px solid var(--p3-color);
        }
        .lane-name { font-weight: 700; font-size: 22px; color: var(--accent); margin: 0; text-transform: uppercase; }
        .lane-stats { display: flex; justify-content: space-around; align-items: center; font-size: 16px; margin-top: 5px; color: var(--text-dark); }
        .stat-box { background: var(--p3-color); padding: 4px 12px; border-radius: 15px; border: 1px solid white; }

        .speak-btn-container {
            position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); z-index: 150; pointer-events: auto;
        }
        .speak-btn { 
            background: white; color: var(--accent); border: 3px solid var(--p3-color); 
            border-radius: 50%; width: 60px; height: 60px; cursor: pointer; 
            font-size: 28px; display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow); transition: transform 0.1s; font-family: 'Fredoka';
        }
        .speak-btn:active { transform: scale(0.9); }

        .sentence-dock {
            position: absolute; bottom: 0; width: 100%; height: auto; min-height: 140px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(5px);
            display: flex; flex-wrap: nowrap; justify-content: center; align-content: center;
            gap: 5px; padding: 15px; box-sizing: border-box; border-top: 4px solid transparent; z-index: 20;
        }
        .p1-dock { border-color: var(--p1-color); }
        .p2-dock { border-color: var(--p2-color); }
        .p3-dock { border-color: var(--p3-color); }

        .word-slot {
            aspect-ratio: 4/5;
            border: 2px dashed var(--p2-color);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--accent);
            background: rgba(144, 202, 249, 0.05);
            max-height: 115px;
        }
        
        .word-slot.filled { border: 2px solid var(--accent); color: #fff; background: var(--accent); border-style: solid; }
        .word-slot.pre-filled { border: 2px solid var(--p2-color); background: var(--p3-color); color: var(--accent); border-style: solid; }

        .word-card {
            position: absolute; aspect-ratio: 4/5; background: white; color: var(--accent);
            border-radius: 10px; box-shadow: var(--shadow); font-weight: bold; 
            cursor: grab; touch-action: none; z-index: 100;
            user-select: none; display: flex; align-items: center; justify-content: center;
            will-change: transform; border: 2px solid var(--p3-color);
            max-height: 115px;
        }

        .ui-layer { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 5000; pointer-events: none; }
        .ui-layer button, .top-btns { pointer-events: auto; }
        
        .top-btns { display: flex; gap: 15px; align-items: center; }

        .music-wrapper { display: flex; align-items: center; gap: 10px; background: rgba(255, 255, 255, 0.6); padding: 5px; border-radius: 30px; transition: 0.3s; border: 1px solid var(--p3-color); }
        .volume-slider { 
            width: 0; opacity: 0; transition: width 0.3s, opacity 0.3s; pointer-events: none;
            -webkit-appearance: none; height: 10px; border-radius: 5px; background: var(--p3-color); outline: none;
        }
        .volume-slider.visible { width: 100px; opacity: 1; pointer-events: auto; }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid white;
        }

        #settings-modal { display: none; position: fixed; z-index: 6000; inset: 0; background: rgba(227, 242, 253, 0.95); overflow-y: auto; padding: 20px; }
        .modal-content { background: #ffffff; color: var(--text-dark); margin: auto; padding: 30px; border-radius: 20px; max-width: 850px; position: relative; font-family: 'Fredoka', sans-serif; box-shadow: var(--shadow); }
        
        .close-x {
            position: absolute; top: 15px; right: 20px; font-size: 30px; font-weight: bold;
            cursor: pointer; color: var(--p1-color); transition: 0.2s; line-height: 1;
        }
        .close-x:hover { color: var(--accent); }

        .btn { padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 5px; background: var(--p3-color); color: var(--accent); transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; font-family: 'Fredoka'; }
        .btn:active { transform: scale(0.95); }
        .toggle-btn { flex: 1; padding: 12px; border: 2px solid var(--p3-color); border-radius: 10px; cursor: pointer; text-align: center; font-weight: bold; font-family: 'Fredoka'; background: white; color: var(--p2-color); }
        .toggle-btn.active { border-color: var(--accent); background: var(--p3-color); color: var(--accent); }
        
        .setting-group { margin-bottom: 20px; border-bottom: 1px solid var(--p3-color); padding-bottom: 15px; }
        .setting-group p { font-weight: bold; margin-bottom: 8px; font-size: 18px; color: var(--accent); }
        .input-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--p3-color); box-sizing: border-box; font-family: 'Fredoka'; margin-top: 5px; font-size: 16px; background: #fcfdfe; color: var(--text-dark); }
        
        .round-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: 2px solid var(--p3-color); color: var(--accent); font-size: 24px; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-family: 'Fredoka'; }
        .bg-preview { width: 40px; height: 40px; border-radius: 5px; border: 1px solid var(--p3-color); background-size: cover; background-position: center; margin-left: 10px; flex-shrink: 0; }

        .lane-overlay {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9);
            display: none; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; color: var(--accent); z-index: 1000;
            text-align: center; padding: 20px;
        }

        #result-screen { background: var(--bg-main); z-index: 7000; text-align: center; }

        .sentence-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: #f8fbff; padding: 15px; border-radius: 12px; border: 1px solid var(--p3-color); }
        .sentence-row-top, .sentence-row-bottom { display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="bg-music" loop src="background.mp3"></audio>
    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/408/408-preview.mp3"></audio>
    <audio id="tts-player"></audio>

    <div id="intro-screen" class="screen">
        <h1 class="main-title">Teacher Angela's<br>Word Completion!</h1>
        <div style="display:flex; gap:15px; flex-wrap: wrap; justify-content: center;">
            <button class="btn" style="background:var(--accent); color:white; font-size:28px; padding: 15px 40px; box-shadow: var(--shadow);" onclick="saveAndStart()">START GAME ▶</button>
            <button class="btn" style="font-size: 20px; background: white; border: 2px solid var(--p3-color);" onclick="openSettings()">SETTINGS ⚙</button>
        </div>
        <div class="top-btns" style="position:fixed; top:20px; right:20px;">
            <div class="music-wrapper">
                <input type="range" class="volume-slider" id="volume-start" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
                <button class="round-btn" onclick="toggleMusic()" id="music-btn-start">🔊</button>
            </div>
            <button class="round-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="ui-layer">
            <button class="btn" onclick="goBackToStart()" style="background: white; color: var(--accent); box-shadow: var(--shadow); font-size: 18px; border: 2px solid var(--p3-color);">⬅ BACK</button>
            <div class="top-btns">
                <div class="music-wrapper">
                    <input type="range" class="volume-slider" id="volume-game" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
                    <button class="round-btn" onclick="toggleMusic()" id="music-btn-game">🔊</button>
                </div>
                <button class="round-btn" onclick="toggleFullscreen()">⛶</button>
            </div>
        </div>
        <div id="game-boundary"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="winner-announcement" style="font-size: 50px; color: var(--accent); text-shadow: 2px 2px 10px rgba(30,136,229,0.2);"></h1>
        <div id="final-scores" style="font-size: 24px; margin-bottom: 30px; color: var(--text-dark);"></div>
        <button class="btn" style="background:var(--accent); color:white; font-size:24px; padding: 20px 40px;" onclick="goBackToStart()">PLAY AGAIN</button>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeSettings()">&times;</span>
            <h2 style="margin-top:0; color: var(--accent); font-size: 32px;">Word Settings</h2>
            
            <div class="setting-group" style="background: #f0f7ff; padding: 15px; border-radius: 12px; border: 1px solid var(--p3-color);">
                <div style="display: flex; align-items:center; justify-content: space-between; margin-bottom: 10px;">
                    <p style="margin:0;">Import Sync:</p>
                    <div style="display: flex; gap: 5px; width: 140px;">
                        <div class="toggle-btn" id="sync-on" onclick="toggleSync(true)" style="padding: 8px;">ON</div>
                        <div class="toggle-btn" id="sync-off" onclick="toggleSync(false)" style="padding: 8px;">OFF</div>
                    </div>
                </div>
                <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                    <button class="btn" onclick="exportData()" style="padding: 8px 15px; font-size: 14px;">💾 EXPORT</button>
                    <button class="btn" onclick="document.getElementById('import-file').click()" style="padding: 8px 15px; font-size: 14px;">📁 IMPORT</button>
                    <button class="btn" onclick="resetToDefaults()" style="color: #d32f2f; padding: 8px 15px; font-size: 14px; background: #ffebee;">♻ RESET ALL</button>
                    <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(this)">
                </div>
            </div>

            <div class="setting-group">
                <p>Progression Mode:</p>
                <div style="display: flex; gap: 10px;">
                    <div class="toggle-btn" id="pace-shared" onclick="toggleSharedPace(true)">SHARED PACE (SYNCED)</div>
                    <div class="toggle-btn" id="pace-random" onclick="toggleSharedPace(false)">RANDOMIZED (INDIVIDUAL)</div>
                </div>
            </div>

            <div class="setting-group" style="margin-top: 15px;">
                <p>Main Start Page Background:</p>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="flex:1;">
                        <input type="text" id="main-bg-url" placeholder="Paste URL or image..." class="input-field" onchange="updateMainBg(this.value)">
                    </div>
                    <div class="bg-preview" id="main-bg-preview"></div>
                </div>
                <div style="display:flex; align-items:center; margin-top:10px;">
                    <button class="btn" onclick="document.getElementById('main-bg-file').click()" style="margin:0; flex:1;">Upload File</button>
                    <input type="file" id="main-bg-file" style="display:none" accept="image/*" onchange="handleMainBgUpload(this)">
                </div>
            </div>

            <div class="setting-group">
                <p>Number of Players:</p>
                <div style="display: flex; gap: 10px;">
                    <div class="toggle-btn" id="p-1" onclick="setPlayers(1)">1</div>
                    <div class="toggle-btn" id="p-2" onclick="setPlayers(2)">2</div>
                    <div class="toggle-btn" id="p-3" onclick="setPlayers(3)">3</div>
                </div>
            </div>

            <div id="player-customization"></div>

            <div class="setting-group">
                <p>Bouncing Speed (Level 1-5):</p>
                <div style="display: flex; gap: 5px;">
                    <div class="toggle-btn speed-btn" id="s-1" onclick="setSpeed(1)">1</div>
                    <div class="toggle-btn speed-btn" id="s-2" onclick="setSpeed(2)">2</div>
                    <div class="toggle-btn speed-btn" id="s-3" onclick="setSpeed(3)">3</div>
                    <div class="toggle-btn speed-btn" id="s-4" onclick="setSpeed(4)">4</div>
                    <div class="toggle-btn speed-btn" id="s-5" onclick="setSpeed(5)">5</div>
                </div>
            </div>

            <div class="setting-group">
                <p>Game Timer (seconds):</p>
                <input type="number" id="timer-input" value="60" class="input-field">
            </div>

            <div class="setting-group">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                    <p style="margin:0;">Word Completion List:</p>
                </div>
                <div id="sentence-container"></div>
                <button class="btn" onclick="addSentenceRow()" style="width: 100%; margin-top: 10px; background: #f0f7ff; color: var(--accent); border: 1px dashed var(--accent);">+ ADD ITEM</button>
            </div>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--p3-color);">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="applySettingsOnly()" style="flex: 1; background: var(--p3-color); color: var(--accent);">💾 SAVE SETTINGS</button>
                <button class="btn" onclick="saveAndStart()" style="flex: 2; background: var(--accent); color: white;">▶ PLAY NOW</button>
            </div>
        </div>
    </div>

    <script>
        let playerCount = 1;
        let gameSpeedLevel = 3;
        let baseTimer = 60;
        let musicPlaying = false;
        let importSync = true;
        let isSharedPace = false; 
        let showTTSButton = true; // Kept as true so logic still works
        let sharedSentenceIdx = 0; 
        let mainBg = localStorage.getItem('teacherAngela_mainBg') || 'background.gif';
        
        let sentenceBank = [
            { shown: "App_e", target: "l", distractors: "p,b", bg: "" },
            { shown: "H_ll_", target: "e,o", distractors: "a,u", bg: "" },
            { shown: "G_at", target: "o", distractors: "e,i", bg: "" }
        ];
        
        let playerConfigs = [
            { name: "Player 1", bg: "background1.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0, wordList: [] },
            { name: "Player 2", bg: "background2.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0, wordList: [] },
            { name: "Player 3", bg: "background3.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0, wordList: [] }
        ];

        let activeSentences = [];
        let globalTimer = 60;
        let timerInterval;
        let physicsRequest;
        let wordsInPlay = [];

        function shuffleArray(array) {
            let newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function speakWord(word) {
            if (!word) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'en-US'; 
            msg.rate = 0.8; 
            msg.pitch = 1.2;
            window.speechSynthesis.speak(msg);
        }

        function repeatWord(pIdx) {
            const wordObj = isSharedPace ? sentenceBank[sharedSentenceIdx] : playerConfigs[pIdx].wordList[playerConfigs[pIdx].currentSentenceIdx];
            if (wordObj) {
                let targets = wordObj.target.split(",").map(t => t.trim());
                let tIdx = 0;
                let full = wordObj.shown.split("").map(char => {
                    if (char === "_" && tIdx < targets.length) return targets[tIdx++];
                    return char;
                }).join("");
                speakWord(full);
            }
        }

        window.onload = () => {
            updateMainBg(mainBg);
            setPlayers(1);
            setSpeed(3);
            toggleSync(true);
            toggleSharedPace(false);
            setupPasteDetection();
            renderSentenceBank();
            document.addEventListener('touchmove', e => { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, { passive: false });
        };

        function toggleSharedPace(val) {
            isSharedPace = val;
            document.getElementById('pace-shared').classList.toggle('active', val);
            document.getElementById('pace-random').classList.toggle('active', !val);
        }

        function toggleSync(val) {
            importSync = val;
            document.getElementById('sync-on').classList.toggle('active', val);
            document.getElementById('sync-off').classList.toggle('active', !val);
        }

        function setupPasteDetection() {
            window.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.includes('image')) {
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const dataUrl = event.target.result;
                            const activeEl = document.activeElement;
                            if (activeEl && activeEl.id.startsWith('sent-shown-')) {
                                const sIdx = parseInt(activeEl.id.split('-').pop());
                                sentenceBank[sIdx].bg = dataUrl;
                                document.getElementById(`sent-prev-${sIdx}`).style.backgroundImage = `url(${dataUrl})`;
                            } else if (activeEl && activeEl.id === 'main-bg-url') {
                                updateMainBg(dataUrl);
                            }
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            });
        }

        function renderSentenceBank() {
            const container = document.getElementById('sentence-container');
            container.innerHTML = '';
            sentenceBank.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'sentence-row';
                row.innerHTML = `
                    <div class="sentence-row-top" style="flex-wrap:wrap">
                        <span style="font-weight:bold; color:var(--accent); width:20px;">${i+1}</span>
                        <input type="text" id="sent-shown-${i}" class="input-field" style="width:100px" value="${item.shown}" placeholder="Shown: H_ll_" oninput="sentenceBank[${i}].shown = this.value">
                        <input type="text" id="sent-target-${i}" class="input-field" style="width:100px" value="${item.target}" placeholder="Target: e,o" oninput="sentenceBank[${i}].target = this.value">
                        <div class="bg-preview" id="sent-prev-${i}" style="background-image: url(${item.bg || ''})"></div>
                        <button class="btn" onclick="document.getElementById('sent-file-${i}').click()" style="padding: 5px 10px; font-size: 12px; margin:0;">Img</button>
                        <input type="file" id="sent-file-${i}" style="display:none" accept="image/*" onchange="handleSentenceBgUpload(${i}, this)">
                        <button class="btn" onclick="removeSentenceRow(${i})" style="color:#d32f2f; padding: 5px 10px; font-size: 12px; margin:0; background:#ffebee;">✖</button>
                    </div>
                    <div class="sentence-row-bottom">
                        <span style="font-size: 12px; color:var(--accent); flex-shrink:0; font-weight: bold;">Distractors:</span>
                        <input type="text" id="sent-dist-${i}" class="input-field" value="${item.distractors || ''}" placeholder="a,b,c..." oninput="sentenceBank[${i}].distractors = this.value">
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function addSentenceRow() { sentenceBank.push({ shown: "", target: "", distractors: "", bg: "" }); renderSentenceBank(); }
        function removeSentenceRow(idx) { sentenceBank.splice(idx, 1); renderSentenceBank(); }
        function handleSentenceBgUpload(idx, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    sentenceBank[idx].bg = e.target.result;
                    document.getElementById(`sent-prev-${idx}`).style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        }

        function updateMainBg(url) {
            if(!url) return;
            mainBg = url;
            localStorage.setItem('teacherAngela_mainBg', url);
            document.getElementById('intro-screen').style.backgroundImage = `linear-gradient(rgba(227, 242, 253, 0.7), rgba(227, 242, 253, 0.7)), url('${url}')`;
            document.getElementById('main-bg-preview').style.backgroundImage = `url('${url}')`;
        }

        function toggleMusic() {
            const bgm = document.getElementById('bg-music');
            const btns = [document.getElementById('music-btn-start'), document.getElementById('music-btn-game')];
            const sliders = [document.getElementById('volume-start'), document.getElementById('volume-game')];
            sliders.forEach(s => s.classList.toggle('visible'));
            if (bgm.paused) {
                bgm.play().catch(e => {});
                musicPlaying = true;
                btns.forEach(b => b.innerText = "🔊");
            } else {
                bgm.pause();
                musicPlaying = false;
                btns.forEach(b => b.innerText = "🔇");
            }
        }

        function changeVolume(val) {
            const bgm = document.getElementById('bg-music');
            bgm.volume = val;
            document.getElementById('volume-start').value = val;
            document.getElementById('volume-game').value = val;
        }

        function setPlayers(n) {
            playerCount = n;
            document.querySelectorAll('[id^="p-"]').forEach(b => b.classList.remove('active'));
            document.getElementById(`p-${n}`).classList.add('active');
            renderPlayerSettings();
        }

        function renderPlayerSettings() {
            const container = document.getElementById('player-customization');
            container.innerHTML = '';
            for(let i=0; i < playerCount; i++) {
                const group = document.createElement('div');
                group.className = 'setting-group';
                group.innerHTML = `
                    <p>Player ${i+1} Name & Background:</p>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <input type="text" class="input-field" id="name-in-${i}" value="${playerConfigs[i].name}">
                        <div style="display:flex; align-items:center;">
                            <button class="btn" onclick="document.getElementById('bg-file-${i}').click()" style="margin:0; flex:1;">Upload Image</button>
                            <input type="file" id="bg-file-${i}" style="display:none" accept="image/*" onchange="handleImageUpload(${i}, this)">
                            <div class="bg-preview" id="preview-${i}" style="background-image: url(${playerConfigs[i].bg})"></div>
                        </div>
                    </div>
                `;
                container.appendChild(group);
            }
        }

        function handleImageUpload(idx, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    playerConfigs[idx].bg = e.target.result;
                    document.getElementById(`preview-${idx}`).style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        }

        function setSpeed(n) {
            gameSpeedLevel = n;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`s-${n}`).classList.add('active');
        }

        function openSettings() {
            baseTimer = parseInt(document.getElementById('timer-input').value) || 60;
            renderSentenceBank(); setPlayers(playerCount); setSpeed(gameSpeedLevel);
            document.getElementById('settings-modal').style.display = 'block';
        }

        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function applySettingsOnly() {
            baseTimer = parseInt(document.getElementById('timer-input').value) || 60;
            for(let i=0; i < playerCount; i++) {
                const nameIn = document.getElementById(`name-in-${i}`);
                if(nameIn) playerConfigs[i].name = nameIn.value || `Player ${i+1}`;
            }
            closeSettings();
        }

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            if (!doc.fullscreenElement) docEl.requestFullscreen(); else doc.exitFullscreen();
        }

        function saveAndStart() {
            applySettingsOnly();
            sharedSentenceIdx = 0; 
            playerConfigs.forEach(p => { 
                p.score = 0; p.finished = false; p.frozen = false; p.currentSentenceIdx = 0; 
                p.wordList = isSharedPace ? [...sentenceBank] : shuffleArray(sentenceBank);
            });
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            initGame();
        }

        function initGame() {
            const boundary = document.getElementById('game-boundary');
            boundary.innerHTML = ''; activeSentences = []; wordsInPlay = []; globalTimer = baseTimer;

            for(let i = 0; i < playerCount; i++) {
                const lane = document.createElement('div');
                lane.className = `player-lane p${i+1}-lane`;
                lane.id = `lane-${i}`;
                if(playerConfigs[i].bg) lane.style.backgroundImage = `url('${playerConfigs[i].bg}')`;
                
                // Pronunciation button is always on during gameplay
                let ttsHtml = `<div class="speak-btn-container"><button class="speak-btn" onclick="repeatWord(${i})">🔊</button></div>`;

                lane.innerHTML = `
                    <div class="lane-header">
                        <div class="lane-name">${playerConfigs[i].name}</div>
                        <div class="lane-stats">
                            <div class="stat-box">Score: <span id="score-${i}">0</span></div>
                            <div class="stat-box">Time: <span id="time-${i}">${globalTimer}s</span></div>
                        </div>
                    </div>
                    <div class="lane-overlay" id="overlay-${i}">COMPLETED!</div>
                    ${ttsHtml}
                    <div class="sentence-dock p${i+1}-dock" id="dock-${i}"></div>
                `;
                boundary.appendChild(lane);
                setupPlayerSentence(i);
            }
            startTimer();
            if(physicsRequest) cancelAnimationFrame(physicsRequest);
            physicsRequest = requestAnimationFrame(updatePhysics);
        }

        function setupPlayerSentence(pIdx) {
            const currentList = playerConfigs[pIdx].wordList;
            const sIdx = isSharedPace ? sharedSentenceIdx : playerConfigs[pIdx].currentSentenceIdx;
            
            if (sIdx >= currentList.length) {
                playerConfigs[pIdx].finished = true;
                playerConfigs[pIdx].timeFinished = globalTimer; 
                document.getElementById(`overlay-${pIdx}`).style.display = 'flex';
                checkIfAllFinished(); return;
            }

            const currentData = currentList[sIdx];
            const targetWords = currentData.target.split(",").map(t => t.trim()); 
            
            let lettersToSpawn = [...targetWords];
            if(currentData.distractors) {
                const dists = currentData.distractors.split(",").map(d => d.trim()).filter(d => d !== "");
                lettersToSpawn = lettersToSpawn.concat(dists);
            }

            const dock = document.getElementById(`dock-${pIdx}`);
            const lane = document.getElementById(`lane-${pIdx}`);
            if(currentData.bg) lane.style.backgroundImage = `url('${currentData.bg}')`;

            dock.innerHTML = '';
            activeSentences[pIdx] = { targets: targetWords, currentWordIdx: 0, wordFinished: false };

            const totalChars = currentData.shown.length;
            const laneWidth = lane.offsetWidth;
            const dockPadding = 30; 
            const totalGap = (totalChars - 1) * 5; 
            const availableWidth = laneWidth - dockPadding - totalGap;
            
            const slotWidth = Math.min(110, availableWidth / totalChars);
            const fontSize = Math.floor(slotWidth * 0.75);

            let missingCharIdx = 0;
            currentData.shown.split("").forEach((char, i) => {
                const slot = document.createElement('div');
                slot.className = 'word-slot';
                slot.style.width = slotWidth + 'px';
                slot.style.fontSize = fontSize + 'px';
                
                if (char === "_") {
                    slot.id = `slot-${pIdx}-${missingCharIdx}`;
                    slot.innerText = ""; 
                    missingCharIdx++;
                } else {
                    slot.innerText = char;
                    slot.classList.add('pre-filled'); 
                }
                dock.appendChild(slot);
            });

            const speedMap = { 1: 0.8, 2: 1.5, 3: 2.5, 4: 4.0, 5: 6.5 };
            const speedFactor = speedMap[gameSpeedLevel] || 2.5;

            lettersToSpawn.forEach(char => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = char; 
                card.style.width = slotWidth + 'px';
                card.style.fontSize = fontSize + 'px';
                lane.appendChild(card);

                setTimeout(() => {
                    const wordObj = {
                        el: card, pIdx: pIdx,
                        x: Math.random() * (lane.offsetWidth - card.offsetWidth),
                        y: 180 + Math.random() * (lane.offsetHeight - 450),
                        vx: (Math.random() > 0.5 ? 1 : -1) * (speedFactor * (0.8 + Math.random() * 0.4)),
                        vy: (Math.random() > 0.5 ? 1 : -1) * (speedFactor * (0.8 + Math.random() * 0.4)),
                        isDragging: false, pointerId: null,
                        width: card.offsetWidth, height: card.offsetHeight
                    };
                    wordsInPlay.push(wordObj);
                    attachPointerEvents(wordObj);
                }, 10);
            });
        }

        function updatePhysics() {
            wordsInPlay.forEach(w => {
                if (!w.isDragging) {
                    const lane = document.getElementById(`lane-${w.pIdx}`);
                    if(!lane) return;
                    const maxX = lane.offsetWidth - w.width;
                    const minY = 160; 
                    const maxY = lane.offsetHeight - 180 - w.height;
                    let nextX = w.x + w.vx;
                    let nextY = w.y + w.vy;
                    if (nextX <= 0) { w.x = 0; w.vx = Math.abs(w.vx); } else if (nextX >= maxX) { w.x = maxX; w.vx = -Math.abs(w.vx); } else { w.x = nextX; }
                    if (nextY <= minY) { w.y = minY; w.vy = Math.abs(w.vy); } else if (nextY >= maxY) { w.y = maxY; w.vy = -Math.abs(w.vy); } else { w.y = nextY; }
                    w.el.style.transform = `translate(${Math.floor(w.x)}px, ${Math.floor(w.y)}px)`;
                }
            });
            physicsRequest = requestAnimationFrame(updatePhysics);
        }

        function attachPointerEvents(wObj) {
            const el = wObj.el;
            const lane = document.getElementById(`lane-${wObj.pIdx}`);
            el.addEventListener('pointerdown', (e) => {
                if(playerConfigs[wObj.pIdx].finished || playerConfigs[wObj.pIdx].frozen || activeSentences[wObj.pIdx].wordFinished) return;
                wObj.isDragging = true; wObj.pointerId = e.pointerId; el.setPointerCapture(e.pointerId);
                const rect = el.getBoundingClientRect();
                wObj.offsetX = e.clientX - rect.left; wObj.offsetY = e.clientY - rect.top;
                el.style.zIndex = 1000;
            });
            el.addEventListener('pointermove', (e) => {
                if (wObj.isDragging && e.pointerId === wObj.pointerId) {
                    const laneRect = lane.getBoundingClientRect();
                    wObj.x = e.clientX - laneRect.left - wObj.offsetX;
                    wObj.y = e.clientY - laneRect.top - wObj.offsetY;
                    el.style.transform = `translate(${Math.floor(wObj.x)}px, ${Math.floor(wObj.y)}px)`;
                }
            });
            const stopDrag = (e) => {
                if (wObj.isDragging && e.pointerId === wObj.pointerId) {
                    wObj.isDragging = false; el.releasePointerCapture(e.pointerId);
                    el.style.zIndex = 100; checkDrop(wObj);
                }
            };
            el.addEventListener('pointerup', stopDrag);
            el.addEventListener('pointercancel', stopDrag);
        }

        function checkDrop(wObj) {
            const pIdx = wObj.pIdx; const state = activeSentences[pIdx];
            const targetChar = state.targets[state.currentWordIdx];
            const slot = document.getElementById(`slot-${pIdx}-${state.currentWordIdx}`);
            if(!slot) return;
            const sRect = slot.getBoundingClientRect(); const wRect = wObj.el.getBoundingClientRect();
            const isOver = !(wRect.right < sRect.left || wRect.left > sRect.right || wRect.bottom < sRect.top || wRect.top > sRect.bottom);
            
            if (isOver) {
                if (wObj.el.innerText.toLowerCase() === targetChar.toLowerCase()) {
                    document.getElementById('sfx-correct').play();
                    slot.innerText = targetChar; 
                    slot.classList.add('filled');
                    wObj.el.remove(); wordsInPlay = wordsInPlay.filter(item => item !== wObj);
                    state.currentWordIdx++; playerConfigs[pIdx].score += 10; updateScoreUI(pIdx);
                    
                    if (state.currentWordIdx === state.targets.length) {
                        state.wordFinished = true;
                        if (isSharedPace) {
                            sharedSentenceIdx++;
                            setTimeout(() => {
                                wordsInPlay.forEach(w => w.el.remove());
                                wordsInPlay = [];
                                for(let i=0; i<playerCount; i++) { document.getElementById(`dock-${i}`).innerHTML = ''; setupPlayerSentence(i); }
                            }, 800);
                        } else {
                            playerConfigs[pIdx].currentSentenceIdx++;
                            setTimeout(() => {
                                wordsInPlay.filter(w => w.pIdx === pIdx).forEach(w => w.el.remove());
                                wordsInPlay = wordsInPlay.filter(w => w.pIdx !== pIdx);
                                setupPlayerSentence(pIdx);
                            }, 500);
                        }
                    }
                } else {
                    document.getElementById('sfx-wrong').play(); 
                    playerConfigs[pIdx].score = Math.max(0, playerConfigs[pIdx].score - 5); updateScoreUI(pIdx);
                    const laneEl = document.getElementById(`lane-${pIdx}`);
                    playerConfigs[pIdx].frozen = true; laneEl.classList.add('frozen');
                    setTimeout(() => { playerConfigs[pIdx].frozen = false; laneEl.classList.remove('frozen'); }, 1500);
                }
            }
        }

        function updateScoreUI(pIdx) { document.getElementById(`score-${pIdx}`).innerText = playerConfigs[pIdx].score; }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                globalTimer--;
                for(let i=0; i<playerCount; i++) { 
                    const el = document.getElementById(`time-${i}`);
                    if(el) el.innerText = globalTimer + "s";
                }
                if(globalTimer <= 0) endGame();
            }, 1000);
        }

        function checkIfAllFinished() { if(playerConfigs.slice(0, playerCount).every(p => p.finished)) endGame(); }

        function endGame() {
            clearInterval(timerInterval); cancelAnimationFrame(physicsRequest);
            const activePlayers = playerConfigs.slice(0, playerCount).sort((a, b) => b.score - a.score || b.timeFinished - a.timeFinished);
            document.getElementById('winner-announcement').innerText = activePlayers[0].name + " WINS!";
            document.getElementById('final-scores').innerHTML = activePlayers.map(p => `<p>${p.name}: ${p.score} pts</p>`).join('');
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
        }

        function goBackToStart() {
            clearInterval(timerInterval); cancelAnimationFrame(physicsRequest);
            document.getElementById('game-boundary').innerHTML = ''; wordsInPlay = [];
            playerConfigs.forEach(p => { p.score = 0; p.finished = false; p.frozen = false; p.currentSentenceIdx = 0; });
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('intro-screen').style.display = 'flex';
        }

        function exportData() {
            applySettingsOnly();
            const data = { bank: sentenceBank, players: playerCount, speed: gameSpeedLevel, timer: baseTimer, configs: playerConfigs, mainBg: mainBg, isShared: isSharedPace, showTTS: showTTSButton };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "WordCompletion.json"; a.click();
        }

        function importData(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (importSync) {
                        if(data.bank) sentenceBank = data.bank;
                        if(data.players) playerCount = data.players;
                        if(data.speed) gameSpeedLevel = data.speed;
                        if(data.timer) baseTimer = data.timer;
                        if(data.mainBg) updateMainBg(data.mainBg);
                        if(data.configs) playerConfigs = data.configs;
                        if(data.hasOwnProperty('isShared')) toggleSharedPace(data.isShared);
                        document.getElementById('timer-input').value = baseTimer;
                        setPlayers(playerCount); setSpeed(gameSpeedLevel); renderSentenceBank();
                        alert("Imported!");
                    }
                } catch(err) { alert("Invalid File"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
